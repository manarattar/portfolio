<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0a0f1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .wrap {
    width: 1100px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.35);
    border-radius: 999px; padding: 6px 16px;
    color: #a5b4fc; font-size: 15px; width: fit-content;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #6ee7b7; }
  h1 {
    font-size: 72px; font-weight: 800; line-height: 1.05;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #818cf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub {
    font-size: 26px; color: rgba(255,255,255,.55); font-weight: 400;
  }
  .tags {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
  }
  .tag {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px; padding: 6px 16px;
    color: rgba(255,255,255,.7); font-size: 15px;
  }
  .url {
    margin-top: 16px; color: rgba(255,255,255,.25); font-size: 16px;
    letter-spacing: .05em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge"><span class="dot"></span> Open to opportunities</div>
    <h1>Manar Attar</h1>
    <div class="sub">AI Researcher &amp; Developer · Master's in Language &amp; AI · VU Amsterdam</div>
    <div class="tags">
      <span class="tag">Agentic AI</span>
      <span class="tag">RAG</span>
      <span class="tag">LLM Fine-tuning</span>
      <span class="tag">NLP</span>
      <span class="tag">FastAPI</span>
      <span class="tag">React</span>
    </div>
    <div class="url">manarattar.com</div>
  </div>
</body>
</html>
